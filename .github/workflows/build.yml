name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  windows:
    name: Windows build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx', '**/*.props', '**/*.targets', 'global.json', 'NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and audit NuGet packages
        shell: pwsh
        run: |
          dotnet restore .\BO2.slnx `
            -p:Configuration=Release `
            -p:Platform=x86 `
            -p:RuntimeIdentifier=win-x86 `
            -p:PublishReadyToRun=true `
            -p:NuGetAudit=true `
            -p:NuGetAuditMode=all `
            -p:NuGetAuditLevel=high `
            -warnaserror:NU1903 `
            -warnaserror:NU1904

      - name: Test non-UI services
        shell: pwsh
        run: |
          dotnet test .\BO2.Tests\BO2.Tests.csproj `
            --configuration Release `
            --no-restore `
            -p:TreatWarningsAsErrors=true `
            --collect:"XPlat Code Coverage" `
            --results-directory .\TestResults `
            -- `
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 14

      - name: Build solution
        shell: pwsh
        run: dotnet build .\BO2.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:WarningsNotAsErrors=IL2104

      - name: Build x86 app
        shell: pwsh
        run: dotnet build .\BO2.csproj --configuration Release --no-restore -p:Platform=x86 -p:TreatWarningsAsErrors=true -p:WarningsNotAsErrors=IL2104
