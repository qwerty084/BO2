name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  windows:
    name: Windows build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test non-UI services
        shell: pwsh
        run: dotnet test .\BO2.Tests\BO2.Tests.csproj --configuration Release

      - name: Build solution
        shell: pwsh
        run: dotnet build .\BO2.slnx --configuration Release

      - name: Build x86 app
        shell: pwsh
        run: dotnet build .\BO2.csproj --configuration Release -p:Platform=x86

