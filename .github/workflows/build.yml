name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  windows:
    name: Windows build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify snapshot contract generation
        shell: pwsh
        run: .\tools\Generate-EventMonitorSnapshotContract.ps1 -Check

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx', '**/*.props', '**/*.targets', 'global.json', 'NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore and audit NuGet packages
        shell: pwsh
        run: |
          dotnet restore .\BO2.slnx `
            -p:Configuration=Release `
            -p:Platform=x86 `
            -p:RuntimeIdentifier=win-x86 `
            -p:PublishReadyToRun=true `
            -p:NuGetAudit=true `
            -p:NuGetAuditMode=all `
            -p:NuGetAuditLevel=high `
            -warnaserror:NU1903 `
            -warnaserror:NU1904

      - name: Verify formatting and style
        shell: pwsh
        run: dotnet format .\BO2.slnx --no-restore -v detailed --verify-no-changes --severity info

      - name: Test non-UI services
        shell: pwsh
        run: |
          dotnet test .\BO2.Tests\BO2.Tests.csproj `
            --configuration Release `
            --no-restore `
            -p:TreatWarningsAsErrors=true `
            --logger "trx;LogFileName=BO2.Tests.trx" `
            --collect:"XPlat Code Coverage" `
            --results-directory .\TestResults `
            -- `
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Test native components (Release)
        shell: pwsh
        run: .\tools\Run-NativeTests.ps1 -Configuration Release

      - name: Test native components (ReleaseWithVmNotifyHook)
        shell: pwsh
        run: .\tools\Run-NativeTests.ps1 -Configuration ReleaseWithVmNotifyHook

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: TestResults/**/*.trx
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 14

      - name: Upload native test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results
          path: TestResults/Native/*.trx
          if-no-files-found: error
          retention-days: 14

      - name: Build solution
        shell: pwsh
        run: dotnet build .\BO2.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:WarningsNotAsErrors=IL2104

      - name: Create MSIX test signing certificate
        shell: pwsh
        run: |
          $workspace = if ([string]::IsNullOrWhiteSpace($env:GITHUB_WORKSPACE)) { (Resolve-Path .).Path } else { $env:GITHUB_WORKSPACE }
          $tempRoot = if ([string]::IsNullOrWhiteSpace($env:RUNNER_TEMP)) { [System.IO.Path]::GetTempPath() } else { $env:RUNNER_TEMP }
          $artifactDir = Join-Path $workspace 'artifacts\msix'
          $pfxPath = Join-Path $tempRoot 'BO2-TestSigning.pfx'

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $thumbprint = .\tools\New-TestSigningCertificate.ps1 `
            -ManifestPath .\Package.appxmanifest `
            -PfxPath $pfxPath `
            -CerPath (Join-Path $artifactDir 'BO2-TestSigning.cer')
          "MSIX_ARTIFACT_DIR=$artifactDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSIX_TEST_CERT_PFX=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSIX_TEST_CERT_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build test-signed x86 MSIX package
        shell: pwsh
        run: |
          dotnet build .\BO2.csproj `
            --configuration Release `
            --no-restore `
            -p:Platform=x86 `
            -p:RuntimeIdentifier=win-x86 `
            -p:AppxPackageDir="$env:MSIX_ARTIFACT_DIR\" `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxBundle=Never `
            -p:GenerateAppxPackageOnBuild=true `
            -p:PackageCertificateKeyFile="$env:MSIX_TEST_CERT_PFX" `
            -p:TreatWarningsAsErrors=true `
            -p:WarningsNotAsErrors=IL2104

      - name: Verify MSIX native payloads
        shell: pwsh
        run: |
          $msixPackages = @(Get-ChildItem -Path "$env:MSIX_ARTIFACT_DIR" -Recurse -Filter 'BO2_*_x86.msix')
          if ($msixPackages.Count -ne 1) {
            throw "Expected exactly one MSIX package in '$env:MSIX_ARTIFACT_DIR', found $($msixPackages.Count)."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($msixPackages[0].FullName)
          try {
            $entries = @($archive.Entries | ForEach-Object { $_.FullName })
            foreach ($payload in @('BO2Monitor.dll', 'BO2InjectorHelper.exe')) {
              if ($payload -notin $entries) {
                throw "MSIX package '$($msixPackages[0].FullName)' is missing native payload '$payload'."
              }
            }
          } finally {
            $archive.Dispose()
          }

      - name: Upload test-signed x86 MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bo2-test-signed-x86-msix
          path: artifacts/msix/**
          if-no-files-found: error
          retention-days: 14

      - name: Install and launch packaged app smoke test
        shell: powershell
        timeout-minutes: 5
        run: |
          .\tools\Test-PackagedAppLaunch.ps1 `
            -PackageDirectory "$env:MSIX_ARTIFACT_DIR" `
            -DiagnosticsDirectory .\TestResults\PackageSmoke

      - name: Remove MSIX test signing certificate
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath "$env:MSIX_TEST_CERT_PFX") {
            Remove-Item -LiteralPath "$env:MSIX_TEST_CERT_PFX" -Force
          }

          if (-not [string]::IsNullOrWhiteSpace($env:MSIX_TEST_CERT_THUMBPRINT)) {
            Remove-Item -LiteralPath "Cert:\CurrentUser\My\$env:MSIX_TEST_CERT_THUMBPRINT" -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "Cert:\CurrentUser\TrustedPeople\$env:MSIX_TEST_CERT_THUMBPRINT" -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "Cert:\LocalMachine\TrustedPeople\$env:MSIX_TEST_CERT_THUMBPRINT" -Force -ErrorAction SilentlyContinue
          }

      - name: Upload package smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-smoke-diagnostics
          path: TestResults/PackageSmoke/**
          if-no-files-found: warn
          retention-days: 14
